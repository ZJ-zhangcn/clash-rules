# ====================
# 基础设置
# ====================
port: 7890
socks-port: 7891
mixed-port: 7892
redir-port: 7893
tproxy-port: 7894
unified-delay: true
geodata-mode: true
geodata-loader: standard
geo-auto-update: true
geo-update-interval: 24
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
allow-lan: true
mode: rule
log-level: info
ipv6: true
udp: true
external-controller: '0.0.0.0:9090'

geox-url:
  mmdb: 'https://geodata.kelee.one/Country-Masaiki.mmdb'
  asn: 'https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb'
  geoip: 'https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat'
  geosite: 'https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat'

profile:
  store-selected: true
  store-fake-ip: true

# ====================
# 嗅探器与 TUN 设置
# ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    TLS:
      ports:
        - 443
        - 8443
    QUIC:
      ports:
        - 443
        - 8443
  force-domain:
    - '+.v2ex.com'
  skip-domain:
    - 'Mijia Cloud'

tun:
  enable: true
  stack: system
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'
  auto-route: true
  auto-detect-interface: true
  strict-route: true

listeners:
  - name: socks5-in-1
    type: socks
    port: 10808
    listen: 0.0.0.0
    udp: true
    users: []
    proxy: DIRECT

# ====================
# 节点过滤正则 (定义锚点)
# ====================
FilterHK: &FilterHK "^(?=.*((?i)港|HK|HKG|Hong(?:Kong)?))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterTW: &FilterTW "^(?=.*((?i)台|TW|TWN|Tai(?:wan)?))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterJP: &FilterJP "^(?=.*((?i)日|JP|JPN|Japan))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterKR: &FilterKR "^(?=.*((?i)韩|KR|KOR|Korea))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterSG: &FilterSG "^(?=.*((?i)新|SG|SGP|Singapore))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterUS: &FilterUS "^(?=.*((?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|USA|United(?:\\s)?States))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterUSNEW: &FilterUSNEW "^(?=.*\\bUS-)(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterUK: &FilterUK "^(?=.*((?i)英|UK|GBR|United(?:\\s)?Kingdom|伦敦))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterFR: &FilterFR "^(?=.*((?i)法|FR|FRA|France))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterDE: &FilterDE "^(?=.*((?i)德|DE|DEU|Germany))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterAll: &FilterAll "^(?=.*(.))(?!.*((?i)群|邀请|返利|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|失联|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|\\d{4}-\\d{2}-\\d{2}|\\dG)).*$"
FilterResidential: &FilterResidential "^.*(?i)(家宽|住宅|isp|residential|native|原生).*$"
FilterIPLC: &FilterIPLC ".*IPLC-美国.*"
FilterUSLD: &FilterUSLD ".*US-ss.*"
FilterAI: &FilterAI "^(?=.*((?i)美|US|JP|JPN|SG|SGP))(?!.*((?i)回国|校园|游戏|GAME|港|HK)).*$"

# ====================
# 策略组公共参数 (定义锚点)
# ====================
UrlTest_Defaults: &url-test-defaults
  type: url-test
  interval: 6
  tolerance: 20
  lazy: true
  url: 'http://www.google.com/blank.html'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: true
  include-all: true

BetterFB_Defaults: &better-fb-defaults
  type: url-test
  interval: 6
  tolerance: 1000
  lazy: true
  url: 'http://www.google.com/blank.html'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: true
  include-all: true

Fallback_Defaults: &fallback-defaults
  type: fallback
  interval: 6
  lazy: true
  url: 'http://www.google.com/blank.html'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: true

# ====================
# 代理策略组
# ====================
proxy-groups:
  # ---- 核心出口组 ----
  - name: Proxy
    type: select
    proxies:
      - BetterFB - 全部
      - URL Test - 全部
      - 香港自动策略
      - 台湾自动策略
      - 日本自动策略
      - 新加坡自动策略
      - 美国自动策略
      - 家宽链式代理
      - 专线链式代理
      - DIRECT

  - name: AI
    type: select
    proxies:
      - BetterFB - AI
      - URL Test - AI
      - 美国自动策略
      - 日本自动策略
      - 家宽链式代理
      - Proxy

  # ---- BetterFB 容差稳定组 ----
  - name: BetterFB - 全部
    <<: *better-fb-defaults
    filter: *FilterAll

  - name: BetterFB - AI
    <<: *better-fb-defaults
    filter: *FilterAI

  # ---- URL Test 测速组 ----
  - name: URL Test - 全部
    <<: *url-test-defaults
    filter: *FilterAll

  - name: URL Test - AI
    <<: *url-test-defaults
    filter: *FilterAI

  # ---- 地区自动策略 ----
  - name: 香港自动策略
    <<: *url-test-defaults
    filter: *FilterHK

  - name: 台湾自动策略
    <<: *url-test-defaults
    filter: *FilterTW

  - name: 日本自动策略
    <<: *url-test-defaults
    filter: *FilterJP

  - name: 韩国自动策略
    <<: *url-test-defaults
    filter: *FilterKR

  - name: 新加坡自动策略
    <<: *url-test-defaults
    filter: *FilterSG

  - name: 英国自动策略
    <<: *url-test-defaults
    filter: *FilterUK

  - name: 法国自动策略
    <<: *url-test-defaults
    filter: *FilterFR

  - name: 德国自动策略
    <<: *url-test-defaults
    filter: *FilterDE

  - name: 美国自动策略
    <<: *url-test-defaults
    filter: *FilterUS

  - name: 美国fallback
    <<: *fallback-defaults
    include-all: true
    filter: *FilterUSNEW

  # ---- 链式代理组 (使用 relay 替代 dialer-proxy) ----
  # 流量走向: 家宽手动策略 → 专线自动策略 → 目标
  - name: 家宽链式代理
    type: select
    proxies:
      - 家宽手动策略
    dialer-proxy: 美国落地


  # ---- 家宽与专线组 ----
  - name: 家宽手动策略
    type: select
    include-all: true
    filter: *FilterResidential

  - name: 专线自动策略
    <<: *url-test-defaults
    filter: *FilterIPLC

  - name: 美国落地
    <<: *url-test-defaults
    filter: *FilterUSLD

  # ---- 流媒体与其他 ----
  - name: TikTok
    <<: *fallback-defaults
    include-all: false
    proxies:
      - 香港自动策略
      - 美国fallback
      - Proxy

  - name: Netflix
    <<: *fallback-defaults
    include-all: false
    proxies:
      - 美国fallback
      - 台湾自动策略
      - Proxy

  - name: Speedtest国际
    type: select
    include-all: true
    filter: *FilterAll
    proxies:
      - DIRECT

  - name: 游戏选择
    type: select
    include-all: true
    filter: *FilterAll
    proxies:
      - DIRECT

# ====================
# 规则提供者
# ====================
rule-providers:
  LAN:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/Lan.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/LAN_SPLITTER.yaml'
  Direct:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/Direct.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/Direct.yaml'
  ProxyDomain:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/Proxy.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/Proxy.yaml'
  AI:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/AI.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/AI.yaml'
  google:
    type: http
    format: mrs
    behavior: domain
    url: 'https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/google.mrs'
    path: ./ruleset/google.mrs
    interval: 86400
  TikTok:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/TikTok.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/TikTok.yaml'
  SpeedtestIntl:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/SpeedtestInternational.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/SpeedtestInternational.yaml'
  Game:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/Game.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/Game.yaml'
  Netflix:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/Netflix.yaml
    url: 'https://rule.kelee.one/Clash/Netflix.yaml'
  ESET_China:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/ESET_China.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/ESET_China.yaml'

# ====================
# DNS 设置
# ====================
dns:
  enable: true
  prefer-h3: true
  listen: '0.0.0.0:1053'
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter:
    - '*.lan'
    - '*.localhost'
    - '*.local'
    - '+.lan'
    - '+.local'
    - '+.localhost'
    - '+.localdomain'
    - '+.942645.xyz'
    - '+.h-e.top'
    - 'stun.*.*'
    - 'stun.*.*.*'
    - '+.stun.playstation.net'
    - 'localhost.ptlogin2.qq.com'
    - '+.ntp.org'
    - '+.pool.ntp.org'
    - 'time*.cloud.tencent.com'
    - 'time.windows.com'
    - 'time.apple.com'
    - 'time1.apple.com'
    - 'time2.apple.com'
    - 'time3.apple.com'
    - 'time4.apple.com'
    - 'time5.apple.com'
    - 'time6.apple.com'
    - 'time7.apple.com'
    - 'ntp.aliyun.com'
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - 'https://1.1.1.1/dns-query#Proxy'
    - 'https://8.8.8.8/dns-query#Proxy'
  nameserver-policy:
    'geosite:cn':
      - 223.5.5.5
      - 223.6.6.6
    'geosite:private':
      - system
    'geosite:synology':
      - 223.5.5.5
      - 223.6.6.6
    'geosite:openai':
      - 'https://1.1.1.1/dns-query#AI'
      - 'https://8.8.8.8/dns-query#AI'
    'geosite:anthropic':
      - 'https://1.1.1.1/dns-query#AI'
      - 'https://8.8.8.8/dns-query#AI'
    'geosite:google-gemini':
      - 'https://1.1.1.1/dns-query#AI'
      - 'https://8.8.8.8/dns-query#AI'
    'geosite:xai':
      - 'https://1.1.1.1/dns-query#AI'
      - 'https://8.8.8.8/dns-query#AI'
  proxy-server-nameserver:
    - 'https://223.5.5.5/dns-query#DIRECT'
    - 'https://223.6.6.6/dns-query#DIRECT'
  direct-nameserver:
    - 'https://223.5.5.5/dns-query#DIRECT'
    - 'https://223.6.6.6/dns-query#DIRECT'
  fallback:
    - 'https://1.0.0.1/dns-query#Proxy'
    - 'https://8.8.4.4/dns-query#Proxy'
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - '240.0.0.0/4'

# ====================
# 分流规则
# ====================
rules:
  # 广告拦截
  - 'GEOSITE,category-ads-all,REJECT'

  # 直连分流
  - 'DOMAIN-SUFFIX,h-e.top,DIRECT'
  - 'DOMAIN-SUFFIX,942645.xyz,DIRECT'
  - 'DOMAIN,proxy.942645.xyz,新加坡自动策略'
  - 'AND,((IP-CIDR,142.171.44.177/32,no-resolve),(DST-PORT,42645)),美国自动策略'
  - 'DOMAIN,openlist.942645.xyz,Proxy'

  - 'RULE-SET,LAN,DIRECT'
  - 'RULE-SET,Direct,DIRECT'
  - 'GEOSITE,google-cn,DIRECT'
  - 'GEOSITE,synology,DIRECT'
  - 'RULE-SET,ESET_China,DIRECT'

  # 服务分流
  - 'RULE-SET,AI,AI'
  - 'RULE-SET,google,AI'
  - 'RULE-SET,TikTok,TikTok'
  - 'RULE-SET,Netflix,Netflix'
  - 'RULE-SET,SpeedtestIntl,Speedtest国际'
  - 'RULE-SET,Game,游戏选择'

  # 兜底分流
  - 'RULE-SET,ProxyDomain,Proxy'
  - 'GEOSITE,gfw,Proxy'
  - 'GEOSITE,cn,DIRECT'
  - 'GEOIP,CN,DIRECT,no-resolve'
  - 'MATCH,Proxy'
