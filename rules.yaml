# ====================
# 基础配置
# ====================
mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false

# ====================
# GeoData 配置
# ====================
geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat"
  geosite: "https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat"

# ====================
# Sniffer 配置
# ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, "8080-8880"]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]

# ====================
# TUN 配置
# ====================
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  strict-route: true
  dns-hijack:
    - "any:53"
    - "tcp://any:53"

# ====================
# DNS 配置
# ====================
dns:
  enable: true
  cache-algorithm: arc
  enhanced-mode: fake-ip
  fake-ip-filter-mode: blacklist
  respect-rules: true
  default-nameserver:
    - "223.5.5.5"
    - "119.29.29.29"
  fake-ip-filter:
    - "geosite:private"
    - "geosite:cn"
    - "geosite:google-cn"
    - "geosite:synology"
    # 0. 直连域名(手动添加)
    - "+.example.com"
    - "+.none.com"
  nameserver-policy:
    # 国内/直连 DNS
    "geosite:cn": ["223.5.5.5#DIRECT", "119.29.29.29#DIRECT"]
    "geosite:private": "system"
    "geosite:google-cn": ["223.5.5.5#DIRECT", "119.29.29.29#DIRECT"]
    "geosite:synology": ["223.5.5.5#DIRECT", "119.29.29.29#DIRECT"]
    # AI 分流 DNS
    "geosite:openai": ["https://1.1.1.1/dns-query#AI", "https://8.8.8.8/dns-query#AI"]
    "geosite:anthropic": ["https://1.1.1.1/dns-query#AI", "https://8.8.8.8/dns-query#AI"]
    "geosite:google-gemini": ["https://1.1.1.1/dns-query#AI", "https://8.8.8.8/dns-query#AI"]
    "geosite:xai": ["https://1.1.1.1/dns-query#AI", "https://8.8.8.8/dns-query#AI"]
  nameserver:
    - "https://1.1.1.1/dns-query#全部"
    - "https://8.8.8.8/dns-query#全部"
  proxy-server-nameserver:
    - "223.5.5.5#DIRECT"
    - "119.29.29.29#DIRECT"
    - "system"
  direct-nameserver:
    - "223.5.5.5#DIRECT"
    - "119.29.29.29#DIRECT"
    - "system"
  direct-nameserver-follow-policy: true

# ====================
# Profile 配置
# ====================
profile:
  store-selected: true
  store-fake-ip: false

# ====================
# 节点过滤正则 (定义锚点)
# ====================
FilterHK: &FilterHK "^(?=.*((?i)港|HK|HKG|Hong(?:Kong)?))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterTW: &FilterTW "^(?=.*((?i)台|TW|TWN|Tai(?:wan)?))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterJP: &FilterJP "^(?=.*((?i)日|JP|JPN|Japan))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterKR: &FilterKR "^(?=.*((?i)韩|KR|KOR|Korea))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterSG: &FilterSG "^(?=.*((?i)新|SG|SGP|Singapore))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterUS: &FilterUS "^(?=.*((?i)美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|US|USA|United(?:\\s)?States))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterUSNEW: &FilterUSNEW "^(?=.*\\bUS-)(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterUK: &FilterUK "^(?=.*((?i)英|UK|GBR|United(?:\\s)?Kingdom|伦敦))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterFR: &FilterFR "^(?=.*((?i)法|FR|FRA|France))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterDE: &FilterDE "^(?=.*((?i)德|DE|DEU|Germany))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterAll: &FilterAll "^(?=.*(.))(?!.*((?i)群|邀请|返利|官网|客服|网站|网址|获取|订阅|流量|到期|机场|下次|版本|官址|备用|过期|已用|联系|邮箱|工单|贩卖|通知|倒卖|防止|国内|地址|频道|无法|说明|使用|提示|特别|访问|支持|教程|关注|更新|作者|加入|超时|收藏|福利|邀请|好友|失联|USE|USED|TOTAL|EXPIRE|EMAIL|Panel|Channel|Author|Traffic|\\d{4}-\\d{2}-\\d{2}|\\dG)).*$"
FilterResidential: &FilterResidential "^.*(?i)(家宽|住宅|isp|residential|native|原生).*$"
FilterUSLD: &FilterUSLD ".*US-ss.*"
FilterAI: &FilterAI "^(?=.*((?i)美|US|JP|JPN|SG|SGP))(?!.*((?i)回国|校园|游戏|GAME|港|HK)).*$"

# ====================
# 策略组公共参数 (定义锚点)
# ====================
UrlTest_Defaults: &url-test-defaults
  type: url-test
  interval: 6
  tolerance: 20
  lazy: true
  url: 'http://www.google.com/blank.html'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: true
  include-all: true

BetterFB_Defaults: &better-fb-defaults
  type: url-test
  interval: 6
  tolerance: 1000
  lazy: true
  url: 'http://www.google.com/blank.html'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: true
  include-all: true

Fallback_Defaults: &fallback-defaults
  type: fallback
  interval: 6
  lazy: true
  url: 'http://www.google.com/blank.html'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: true

# ====================
# 策略组
# ====================
# 定义正则表达式常量以便复用（YAML不支持变量，此处为逻辑示意，实际需在每组中写明）
# INFO_REGEX: (?i)群|邀请|返利|官网|官方|网址|订阅|购买|续费|剩余|到期|过期|流量|备用|邮箱|客服|联系|工单|倒卖|防止|梯子|tg|telegram|电报|发布|重置
# HK_REGEX: (?i)港|hk|hkg|hong ?kong

proxy-groups:
  # ---- 核心出口组 ----
  - name: 全部
    type: select
    proxies:
      - BetterFB - 全部
      - URL Test - 全部
      - 美国fallback
      - 香港自动策略
      - 台湾自动策略
      - 日本自动策略
      - 韩国自动策略
      - 新国自动策略
      - 英国自动策略
      - 法国自动策略
      - 美国自动策略
      - 家宽链式代理
      - DIRECT

  - name: AI
    type: select
    proxies:
      - BetterFB - AI
      - URL Test - AI
      - 美国fallback
      - 家宽链式代理
      - 全部

  # ---- BetterFB 容差稳定组 ----
  - name: BetterFB - 全部
    <<: *better-fb-defaults
    filter: *FilterAll

  - name: BetterFB - AI
    <<: *better-fb-defaults
    filter: *FilterAI

  # ---- URL Test 测速组 ----
  - name: URL Test - 全部
    <<: *url-test-defaults
    filter: *FilterAll

  - name: URL Test - AI
    <<: *url-test-defaults
    filter: *FilterAI

  # ---- 地区自动策略 ----
  - name: 香港自动策略
    <<: *url-test-defaults
    filter: *FilterHK

  - name: 台湾自动策略
    <<: *url-test-defaults
    filter: *FilterTW

  - name: 日本自动策略
    <<: *url-test-defaults
    filter: *FilterJP

  - name: 韩国自动策略
    <<: *url-test-defaults
    filter: *FilterKR

  - name: 新国自动策略
    <<: *url-test-defaults
    filter: *FilterSG

  - name: 英国自动策略
    <<: *url-test-defaults
    filter: *FilterUK

  - name: 法国自动策略
    <<: *url-test-defaults
    filter: *FilterFR

  - name: 德国自动策略
    <<: *url-test-defaults
    filter: *FilterDE

  - name: 美国自动策略
    <<: *url-test-defaults
    filter: *FilterUS

  - name: 美国fallback
    type: fallback
    interval: 6
    lazy: true
    url: 'http://www.google.com/blank.html'
    disable-udp: false
    timeout: 2000
    max-failed-times: 3
    hidden: false
    include-all: true
    filter: *FilterUSNEW

  # ---- 家宽与专线组 ----
  - name: 家宽手动策略
    type: select
    include-all: true
    filter: *FilterResidential

  - name: 家宽链式代理
    type: select
    hidden: true
    proxies:
      - 家宽手动策略
    dialer-proxy: 美国落地

  - name: 美国落地
    <<: *url-test-defaults
    filter: *FilterUSLD

  # ---- 流媒体与其他 ----
  - name: Speedtest国际
    type: select
    include-all: true
    filter: *FilterAll
    proxies:
      - PASS
      - DIRECT

  - name: 游戏选择
    type: select
    include-all: true
    filter: *FilterAll
    proxies:
      - PASS
      - DIRECT

# ====================
# 规则提供者
# ====================
rule-providers:
  SpeedtestIntl:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/SpeedtestInternational.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/SpeedtestInternational.yaml'
  Game:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/Game.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/Game.yaml'

# ====================
# 规则配置
# ====================
rules:
  # 广告过滤
  - GEOSITE,category-ads-all,REJECT

  # 直连分流
  - GEOSITE,private,DIRECT
  - GEOIP,private,DIRECT,no-resolve
  - GEOSITE,google-cn,DIRECT
  - GEOSITE,synology,DIRECT
  - DOMAIN-SUFFIX,sharepoint.com,DIRECT
  - DOMAIN-SUFFIX,example.com,DIRECT
  - DOMAIN-SUFFIX,none.com,DIRECT

  # 服务分流
  - RULE-SET,SpeedtestIntl,Speedtest国际
  - RULE-SET,Game,游戏选择
  - DOMAIN-SUFFIX,942645.xyz,全部
  - AND,((IP-CIDR,142.171.44.177/32,no-resolve),(DST-PORT,42645)),美国fallback

  # AI 分流
  - GEOSITE,openai,AI
  - GEOSITE,anthropic,AI
  - GEOSITE,google-gemini,AI
  - GEOSITE,xai,AI

  # 兜底分流
  - GEOSITE,gfw,全部
  - GEOSITE,cn,DIRECT
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,全部
