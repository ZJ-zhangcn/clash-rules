FilterResidential: ^.*(?i)(家宽|住宅|isp|residential|native|原生).*$
FilterZX: .*IPLC-美国.*
FilterUSLD: .*US-ss.*
UrlTest:
  type: url-test
  interval: 6
  tolerance: 20
  lazy: true
  url: 'http://www.google.com/blank.html'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: true
  include-all: true
FallBack:
  type: fallback
  interval: 6
  lazy: true
  url: 'http://www.google.com/blank.html'
  disable-udp: false
  timeout: 2000
  max-failed-times: 3
  hidden: true
  include-all: true
