# ====================
// 基础设置
// ====================
port: 7890
socks-port: 7891
mixed-port: 7892
redir-port: 7893
tproxy-port: 7894
unified-delay: true
geodata-mode: true  # 开启 geodata 模式，配合 JS 脚本的 GEO 规则
geo-auto-update: true
geo-update-interval: 24
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
allow-lan: true
mode: rule
log-level: info
ipv6: true
udp: true
external-controller: '0.0.0.0:9090'

geox-url:
  mmdb: 'https://geodata.kelee.one/Country-Masaiki.mmdb'
  asn: 'https://geodata.kelee.one/GeoLite2-ASN-P3TERX.mmdb'
  geoip: 'https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.dat'
  geosite: 'https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat'

profile:
  store-selected: true
  store-fake-ip: true  # 修复：开启 store-fake-ip 映射，避免重启后丢失映射导致断网

# ====================
// 嗅探器与 TUN 设置
// ====================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - '+.v2ex.com'
  skip-domain:
    - 'Mijia Cloud'

tun:
  enable: true
  stack: system
  dns-hijack:
    - 'any:53'
    - 'tcp://any:53'  # 增加 tcp 劫持
  auto-route: true
  auto-detect-interface: true
  strict-route: true  # 增加 strict-route 防止路由泄漏

# ====================
// 监听器设置
// ====================
listeners:
  - name: socks5-in-1
    type: socks
    port: 10808
    listen: 0.0.0.0
    udp: true
    users: []
    proxy: DIRECT

# ====================
// 节点过滤正则定义
// ====================
FilterHK: "^(?=.*((?i)港|HK|HKG|HongKong))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterTW: "^(?=.*((?i)台|TW|TWN|Tai))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterJP: "^(?=.*((?i)日|JP|JPN|Japan))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterKR: "^(?=.*((?i)韩|KR|KOR|Korea))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterSG: "^(?=.*((?i)新|SG|SGP|Singapore))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterUS: "^(?=.*((?i)美|US|USA|United States))(?!.*((?i)回国|校园|游戏|GAME)).*$"
FilterAll: "^(?=.*(.))(?!.*((?i)群|邀请|返利|官网|客服|订阅|流量|到期|机场|备用|过期|已用|联系|邮箱|工单|贩卖|倒卖|防止|特别|教程|更新|失联|频道|TOTAL|EXPIRE|Traffic)).*$"
FilterResidential: "^.*(?i)(家宽|住宅|isp|residential|native|原生).*$"
FilterZX: ".*IPLC-美国.*" # 调整：更精确的专线匹配
FilterUSLD: ".*US-ss.*"
FilterUSNEW: "^(?=.*\\bUS-)(?!.*((?i)回国|校园|游戏|\U0001F3AE|(\\bGAME\\b))).*$"

# ====================
// 策略组公共参数锚点
// ====================
UrlTest_Defaults: &url-test-defaults
  type: url-test
  interval: 300
  tolerance: 50
  lazy: true
  url: 'http://www.gstatic.com/generate_204'
  timeout: 1000
  max-failed-times: 3
  hidden: true
  include-all: true

BetterFB_Defaults: &better-fb-defaults
  type: url-test
  interval: 300
  tolerance: 1000  # 高容差，接近 fallback，稳定性更好
  lazy: true
  url: 'http://www.gstatic.com/generate_204'
  timeout: 1000
  max-failed-times: 5
  hidden: true
  include-all: true

Fallback_Defaults: &fallback-defaults
  type: fallback
  interval: 300
  lazy: true
  url: 'http://www.gstatic.com/generate_204'
  timeout: 1000
  max-failed-times: 3
  hidden: true

# ====================
// 策略组定义
// ====================
proxy-groups:
  # === 核心出口组 ===
  - name: "Proxy"
    type: select
    proxies: ['BetterFB - 全部', 'URL Test - 全部', '香港自动策略', '台湾自动策略', '日本自动策略', '新加坡自动策略', '美国自动策略', '专线链式代理', '家宽链式代理', 'DIRECT']

  - name: "AI"
    type: select
    proxies: ['BetterFB - AI', 'URL Test - AI', '美国自动策略', '日本自动策略', '家宽链式代理', 'Proxy']

  # === 稳定与测速组 ===
  - name: "BetterFB - 全部"
    <<: *better-fb-defaults
    filter: *FilterAll

  - name: "URL Test - 全部"
    <<: *url-test-defaults
    tolerance: 50
    filter: *FilterAll

  - name: "BetterFB - AI"
    <<: *better-fb-defaults
    filter: "^(?=.*((?i)美|US|JP|JPN|SG|SGP))(?!.*((?i)回国|校园|游戏|GAME|港|HK)).*$"

  - name: "URL Test - AI"
    <<: *url-test-defaults
    tolerance: 50
    filter: "^(?=.*((?i)美|US|JP|JPN|SG|SGP))(?!.*((?i)回国|校园|游戏|GAME|港|HK)).*$"

  # === 兜底与备用组 ===
  - name: "兜底后备策略"
    <<: *fallback-defaults
    include-all: false
    proxies: ['日本自动策略', '新加坡自动策略', '香港自动策略', '台湾自动策略', '美国自动策略', 'DIRECT']

  # === 地区自动策略 ===
  - name: "香港自动策略"
    <<: *url-test-defaults
    filter: *FilterHK

  - name: "台湾自动策略"
    <<: *url-test-defaults
    filter: *FilterTW

  - name: "日本自动策略"
    <<: *url-test-defaults
    filter: *FilterJP

  - name: "新加坡自动策略"
    <<: *url-test-defaults
    filter: *FilterSG

  - name: "美国自动策略"
    <<: *url-test-defaults
    filter: *FilterUSNEW

  # === 专线与家宽组 ===
  - name: "家宽手动策略"
    type: select
    include-all: true
    filter: *FilterResidential

  - name: "家宽链式代理"
    type: select
    proxies: ['家宽手动策略']
    dialer-proxy: '专线自动策略'

  - name: "专线自动策略"
    <<: *url-test-defaults
    filter: *FilterIPLC

  - name: "美国落地"
    <<: *url-test-defaults
    tolerance: 20
    filter: *FilterUSLD

  - name: "专线链式代理"
    type: select
    proxies: ['美国落地']
    dialer-proxy: '专线自动策略'

  # === 流媒体与其他 ===
  - name: "TikTok"
    <<: *fallback-defaults
    include-all: false
    proxies: ['香港自动策略', '美国自动策略', '专线链式代理', '兜底后备策略']

  - name: "Netflix"
    <<: *fallback-defaults
    include-all: false
    proxies: ['美国自动策略', '台湾自动策略', '专线链式代理', '兜底后备策略']

  - name: "Speedtest国际"
    type: select
    include-all: true
    filter: *FilterAll
    proxies: ['PASS', 'DIRECT']

  - name: "游戏选择"
    type: select
    include-all: true
    filter: *FilterAll
    proxies: ['PASS', 'DIRECT']

# ====================
// 规则提供者
// ====================
rule-providers:
  LAN:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/Lan.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/LAN_SPLITTER.yaml'
  Direct:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/Direct.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/Direct.yaml'
  Proxy:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/Proxy.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/Proxy.yaml'
  AI:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/AI.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/AI.yaml'
  google:
    type: http
    format: mrs
    behavior: domain
    url: 'https://github.com/MetaCubeX/meta-rules-dat/raw/refs/heads/meta/geo/geosite/google.mrs'
    path: ./ruleset/google.mrs
    interval: 86400
  TikTok:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: ./rules/TikTok.yaml
    url: 'https://kelee.one/Tool/Clash/Rule/TikTok.yaml'
  SpeedtestIntl:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: './rules/SpeedtestInternational.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/SpeedtestInternational.yaml'
  Game:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: './rules/Game.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/Game.yaml'
  Netflix:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: './rules/Netflix.yaml'
    url: 'https://rule.kelee.one/Clash/Netflix.yaml'
  ESET_China:
    type: http
    behavior: classical
    interval: 3600
    format: yaml
    proxy: DIRECT
    path: './rules/ESET_China.yaml'
    url: 'https://kelee.one/Tool/Clash/Rule/ESET_China.yaml'

# ====================
// 重构后的 DNS 设置
// ====================
dns:
  enable: true
  prefer-h3: true
  listen: '0.0.0.0:1053'
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 28.0.0.1/8
  fake-ip-filter-mode: blacklist  # 修复：采用黑名单模式
  fake-ip-filter:
    - '+'  # 默认所有域名返回 fake-ip
    - '+.lan'
    - '+.localhost'
    - '+.local'
    - 'geosite:private'
    - 'geosite:cn'
    - 'geosite:google-cn'
    - 'geosite:synology'
    - '+.942645.xyz'  # 保留你的直连域名
    - '+.h-e.top'     # 保留你的直连域名
  default-nameserver:
    - 223.5.5.5
    - 223.6.6.6
  nameserver:
    - 'https://1.1.1.1/dns-query#Proxy'  # 默认走代理 DNS
    - 'https://8.8.8.8/dns-query#Proxy'
  nameserver-policy:
    # 国内域名走直连 DNS
    'geosite:cn': ['223.5.5.5', '223.6.6.6']
    'geosite:private': ['system']
    'geosite:google-cn': ['223.5.5.5', '223.6.6.6']
    'geosite:synology': ['223.5.5.5', '223.6.6.6']
    # AI 域名走代理 DNS (结合 JS 脚本思想)
    'geosite:openai': ['https://1.1.1.1/dns-query#AI', 'https://8.8.8.8/dns-query#AI']
    'geosite:anthropic': ['https://1.1.1.1/dns-query#AI', 'https://8.8.8.8/dns-query#AI']
    'geosite:google-gemini': ['https://1.1.1.1/dns-query#AI', 'https://8.8.8.8/dns-query#AI']
    'geosite:xai': ['https://1.1.1.1/dns-query#AI', 'https://8.8.8.8/dns-query#AI']
  fallback:
    - 'https://1.0.0.1/dns-query#Proxy'
    - 'https://8.8.4.4/dns-query#Proxy'
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - '240.0.0.0/4'

# ====================
// 分流规则 (融合 JS 与原配置)
// ====================
rules:
  # 广告拦截 (来自 JS)
  - 'GEOSITE,category-ads-all,REJECT'

  # 直连分流 (来自 JS 与原配置合并)
  - 'DOMAIN-SUFFIX,h-e.top,DIRECT'
  - 'DOMAIN-SUFFIX,942645.xyz,DIRECT'
  - 'DOMAIN,proxy.942645.xyz,新加坡自动策略'
  - 'AND,((IP-CIDR,142.171.44.177/32,no-resolve),(DST-PORT,42645)),美国自动策略'

  - 'RULE-SET,LAN,DIRECT'
  - 'RULE-SET,Direct,DIRECT'
  - 'GEOSITE,google-cn,DIRECT'
  - 'GEOSITE,synology,DIRECT'
  - 'RULE-SET,ESET_China,DIRECT'

  # 服务分流
  - 'RULE-SET,AI,AI'
  - 'RULE-SET,google,AI'
  - 'RULE-SET,TikTok,TikTok'
  - 'RULE-SET,Netflix,Netflix'
  - 'RULE-SET,SpeedtestIntl,Speedtest国际'
  - 'RULE-SET,Game,游戏选择'

  # 兜底分流 (来自 JS 与原配置合并)
  - 'RULE-SET,Proxy,兜底后备策略'
  - 'GEOSITE,gfw,兜底后备策略'
  - 'GEOSITE,cn,DIRECT'
  - 'GEOIP,CN,DIRECT,no-resolve'
  - 'MATCH,兜底后备策略'
